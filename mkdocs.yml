site_name: "Astrosynthesis: Excitations and Expressions of Emergence"
site_description: "A persistence-based theory of emergence — formal, mathematical, and exhaustive."
site_author: "intent-tensor-theory"
site_url: "https://intent-tensor-theory.github.io/git_0.0_-astrosynthesis/book1/"

repo_url: "https://github.com/intent-tensor-theory/git_0.0_-astrosynthesis"
repo_name: "intent-tensor-theory/git_0.0_-astrosynthesis"
edit_uri: ""

docs_dir: git_1.0_excitations_and_expressions_of_emergence/book

theme:
  name: material
  custom_dir: docs_overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Crimson Pro
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - _static/extra.css

extra_javascript:
  - _static/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: en
  - print-site:
      add_to_navigation: true
      print_page_title: "Print / Download"
      add_print_site_banner: false
      add_table_of_contents: true
      toc_title: "Table of Contents"
      toc_depth: 3
      add_full_urls: false
      enumerate_headings: false
      enumerate_figures: false
      add_cover_page: false
      path_to_pdf: "assets/astrosynthesis.pdf"
      include_css: true
      enabled: true

