name: Deploy Astrosynthesis — Dual Book + ICHTB Model

on:
  push:
    branches:
      - main
    paths:
      - 'git_1.0_excitations_and_expressions_of_emergence/book/**'
      - 'git_2.0_ICHTB/ichtb_paper/**'
      - 'mkdocs.yml'
      - 'mkdocs_ichtb.yml'
      - 'site_wrapper/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs-material \
            mkdocs-material[imaging] \
            pymdown-extensions \
            mkdocs>=1.5 \
            mkdocs-print-site-plugin

      - name: Build Book 1 — CTS (light theme → /book1/)
        run: mkdocs build -f mkdocs.yml -d site/book1

      - name: Build Book 2 — ICHTB (dark theme → /book2/)
        run: mkdocs build -f mkdocs_ichtb.yml -d site/book2

      - name: Assemble site root
        run: |
          cp site_wrapper/index.html site/index.html
          touch site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: false
